name: joy_of_change_v3
description: "A health and weight management app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # State Management
  flutter_bloc: ^8.1.4
  
  # Navigation
  go_router: ^13.2.0
  
  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  logger: ^2.0.2+1
  
  # Dependency Injection
  get_it: ^7.6.7
  
  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  
  # Device & System
  device_info_plus: ^9.1.2
  uuid: ^4.3.3
  package_info_plus: ^5.0.1
  
  # Notifications
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^18.0.0
  
  # Background Tasks
  workmanager: ^0.9.0+3
  
  # Security
  window_manager: ^0.5.1
  secure_application: ^4.1.0
  
  # Utilities
  intl: ^0.18.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  path_provider: ^2.1.2
  
  # Environment
  flutter_dotenv: ^5.1.0

  shared_preferences: ^2.0.15

  # Images & Animations
  cached_network_image: ^3.2.1
  flutter_staggered_animations: ^1.1.1
  video_player: ^2.9.0
  audioplayers: ^6.0.0

  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  photo_view: ^0.15.0
  connectivity_plus: ^7.1.1

  confetti: ^0.7.0
  carousel_slider: ^5.1.2
  flutter_riverpod: ^2.6.1
dependency_overrides:
 
  web: ^0.5.1  # Force a compatible web version
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true